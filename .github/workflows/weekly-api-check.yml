name: Weekly Hostinger API Update Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:  # Manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Check for API updates
        id: check
        run: python scripts/check-api-updates.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tracking PR
        if: steps.check.outputs.updates_found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="api-updates/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"

          git add tracking/
          git commit -m "Update API tracking data - $(date +%Y-%m-%d)"
          git push origin "$BRANCH"

          gh pr create \
            --title "API Update Detected - $(date +%Y-%m-%d)" \
            --body "$(cat <<'EOF'
          ## Hostinger API Update Detected

          The weekly API changelog check found updates that may require skill documentation changes.

          ### Details
          - **Update count:** ${{ steps.check.outputs.update_count }}
          - **Check date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ### Next Steps
          1. Review the changelog at https://github.com/hostinger/api/blob/main/CHANGELOG.md
          2. Update affected SKILL.md files
          3. Update `last_updated` frontmatter in modified skills

          ---
          *Auto-generated by weekly API update check*
          EOF
          )" \
            --label "api-update,documentation"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
